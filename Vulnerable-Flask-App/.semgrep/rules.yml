rules:
  # INJECTION (A03:2021 - Injection)
  - id: flask-sqli-string-interpolation
    languages: [python]
    severity: ERROR
    message: "КРИТ. УЯЗВИМОСТЬ: Обнаружена SQL-инъекция! Строка SQL-запроса формируется небезопасным динамическим форматированием через оператор '%' с пользовательским вводом. Злоумышленник может полностью скомпрометировать базу данных."
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
    patterns:
      - pattern-either:
          - pattern: $CUR.execute("..." % ...)
          - pattern: $CUR.execute($QUERY % ...)

  - id: python-rce-subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: "КРИТ. УЯЗВИМОСТЬ: Удаленное выполнение кода (RCE) через Command Injection! Вызов subprocess с флагом shell=True позволяет злоумышленнику выполнять произвольные системные команды в ОС от имени сервера."
    metadata:
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp: "A03:2021 - Injection"
    patterns:
      - pattern-either:
          - pattern: subprocess.check_output(..., shell=True)
          - pattern: subprocess.check_output($CMD, shell=True)

  - id: flask-ssti-render-template-string
    languages: [python]
    severity: ERROR
    message: "КРИТ. УЯЗВИМОСТЬ: Внедрение серверных шаблонов (SSTI)! Использование f-строк или конкатенации внутри render_template_string позволяет злоумышленнику выполнить произвольный код Python в контексте приложения."
    metadata:
      cwe: "CWE-1336: Improper Neutralization of Special Elements Used in a Template Engine"
      owasp: "A03:2021 - Injection"
    patterns:
      - pattern-either:
          - pattern: render_template_string(f"..." )
          - pattern: render_template_string("..." + $VAR)

  # BROKEN ACCESS CONTROL & FILE OPERATIONS
  - id: python-path-traversal-arbitrary-file-access
    languages: [python]
    severity: ERROR
    message: "УЯЗВИМОСТЬ: Выход за пределы каталога (Path Traversal)! Функция open() принимает аргумент filename напрямую из запроса без валидации. Позволяет неавторизованно читать или перезаписывать системные файлы (например, ../../../../etc/passwd)."
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp: "A01:2021 - Broken Access Control"
    patterns:
      - pattern-either:
          - pattern: open(filename, ...)
          - pattern: open($VAR, ...)

  # INSECURE DESERIALIZATION
  - id: python-insecure-deserialization-pickle
    languages: [python]
    severity: ERROR
    message: "КРИТ. УЯЗВИМОСТЬ: Небезопасная десериализация объектов! Использование функции pickle.loads() на недоверенных данных из сети (socket) автоматически приводит к удаленному выполнению произвольного кода (RCE) при парсинге."
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
    pattern: pickle.loads(...)

  # SECURITY MISCONFIGURATION & LOGGING
  - id: flask-hardcoded-upload-folder
    languages: [python]
    severity: WARNING
    message: "ПРЕДУПРЕЖДЕНИЕ: Хардкод путей в конфигурации. Путь к UPLOAD_FOLDER привязан к конкретному локальному пользователю Linux (/home/kali/...), что нарушает переносимость приложения и раскрывает структуру папок сервера."
    metadata:
      cwe: "CWE-1188: Insecure Default Initialization of Resource"
      owasp: "A05:2021 - Security Misconfiguration"
    pattern: app.config['UPLOAD_FOLDER'] = "..."

  - id: python-improper-output-neutralization-logging
    languages: [python]
    severity: WARNING
    message: "ПРЕДУПРЕЖДЕНИЕ: Опасное логирование пользовательских данных (Log Injection / CRLF Injection). Запись сырых данных от клиента в файл лога позволяет злоумышленнику подделывать записи в журналах restapi.log."
    metadata:
      cwe: "CWE-117: Improper Output Neutralization for Logs"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
    patterns:
      - pattern-either:
          - pattern: logging.debug(data)
          - pattern: logging.debug(str(data))
          - pattern: logging.debug($X)

  - id: flask-debug-logging-in-routes
    languages: [python]
    severity: WARNING
    message: "ПРЕДУПРЕЖДЕНИЕ: Повторная небезопасная инициализация logging.basicConfig внутри функций обработки запросов (роутов). Конфигурация логирования должна выполняться один раз при старте приложения."
    metadata:
      cwe: "CWE-756: Missing Custom Error Page"
      owasp: "A05:2021 - Security Misconfiguration"
    pattern: logging.basicConfig(...)

  # REVERSE ENGINEERING & HARDCODED CREDENTIALS
  - id: flask-hardcoded-admin-credentials
    languages: [python]
    severity: ERROR
    message: "КРИТ. УЯЗВИМОСТЬ: Хардкод бизнес-логики и учетных данных! Роут /get_admin_mail проверяет строку 'admin' напрямую, а роут /login содержит жестко зашитую проверку строки 'test', что делает невозможным безопасное управление доступом."
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
    patterns:
      - pattern-either:
          - pattern: 'if control == "admin":'
          - pattern: 'if "test" in username and "test" in passwd:'

  # REGULAR EXPRESSIONS & DENIAL OF SERVICE
  - id: python-redos-regex-search
    languages: [python]
    severity: WARNING
    message: "ПРЕДУПРЕЖДЕНИЕ: Потенциальный отказ в обслуживании на регулярных выражениях (ReDoS). Использование re.search(username, password), где один из параметров полностью контролируется пользователем, может заблокировать CPU сервера."
    metadata:
      cwe: "CWE-1333: Inefficient Regular Expression Complexity"
      owasp: "A05:2021 - Security Misconfiguration"
    pattern: re.search(username, password)

  # DANGEROUS NETWORK BINDING
  - id: flask-dangerous-host-binding
    languages: [python]
    severity: WARNING
    message: "ПРЕДУПРЕЖДЕНИЕ: Веб-сервер слушает все сетевые интерфейсы (0.0.0.0). Это открывает доступ к отладочному порту Flask из внешних публичных сетей."
    metadata:
      cwe: "CWE-1327: Binding to an Unnecessary Network Interface"
      owasp: "A05:2021 - Security Misconfiguration"
    pattern: app.run(host="0.0.0.0", ...)
