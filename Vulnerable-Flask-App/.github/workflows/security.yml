rules:
  - id: flask-sqli-string-format
    languages: [python]
    severity: ERROR
    message: "КРИТИЧЕСКАЯ УЯЗВИМОСТЬ: Обнаружена SQL-инъекция! Строка запроса формируется небезопасным форматированием."
    pattern: $CUR.execute(...)

  - id: python-rce-subprocess-shell
    languages: [python]
    severity: ERROR
    message: "КРИТИЧЕСКАЯ УЯЗВИМОСТЬ: Удаленное выполнение кода (RCE) через subprocess с флагом shell=True."
    pattern: subprocess.check_output(..., shell=True)

  - id: python-path-traversal-open
    languages: [python]
    severity: ERROR
    message: "УЯЗВИМОСТЬ: Потенциальный Path Traversal. Функция open() принимает внешние данные без валидации пути."
    pattern: open($FILE, ...)

  - id: python-insecure-deserialization-pickle
    languages: [python]
    severity: ERROR
    message: "КРИТИЧЕСКАЯ УЯЗВИМОСТЬ: Небезопасная десериализация через pickle.loads."
    pattern: pickle.loads(...)
