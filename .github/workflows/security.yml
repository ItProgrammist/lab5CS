name: Production Security Engineering Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sast_analysis:
    name: Automated SAST (Semgrep Engine)
    runs-on: ubuntu-latest
    steps:
      - name: 1.1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 1.2. Install Semgrep CLI
        run: pip install semgrep

      - name: 1.3. Execute Code Scanning
        run: semgrep scan --config=.semgrep/rules.yml --text --error || true

  sca_analysis:
    name: Automated SCA (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    steps:
      - name: 2.1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2.2. Run OWASP Dependency-Check Core Engine
        uses: dependency-check/DependencyCheck_Action@main
        id: DependencyCheckCore
        with:
          project: "lab5CS"
          path: "."
          format: "HTML"
          out: "reports"
          args: "--prettyPrint"

      - name: 2.3. Upload SCA HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-sca-dependency-report
          path: reports/

  dast_analysis:
    name: Automated DAST (OWASP ZAP Fuzzer)
    runs-on: ubuntu-latest
    steps:
      - name: 3.1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 3.2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3.3. Install Dependencies
        run: pip install -r requirements.txt || true

      - name: 3.4. Mock Infrastructure
        run: |
          touch test.db
          touch restapi.log
          sudo mkdir -p /home/kali/Desktop/upload
          sudo chmod -R 777 /home/kali/Desktop/upload

      - name: 3.5. Start Flask App
        run: |
          python vulnerable-flask-app-linux.py > flask.log 2>&1 &
          sleep 7

      - name: 3.6. Run OWASP ZAP via Docker Direct
        run: |
          docker run --rm -v "$(pwd):/zap/wrk/:rw" --network=host -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:8081 -r /zap/wrk/report_html.html || true

      - name: 3.7. Upload DAST HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-dast-zap-report
          path: report_html.html
